<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Advanced Table</title>
</head>

<body>

<h1>Data Table</h1>

<table border="1">
  <tr>
    <th>Item</th>
    <th colspan="2">Details</th>
  </tr>
  <tr>
    <td>Apple</td>
    <td>Red</td>
    <td>Sweet</td>
  </tr>
  <tr>
    <td>Banana</td>
    <td>Yellow</td>
    <td>Soft</td>
  </tr>
</table>

</body>
</html>
