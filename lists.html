<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lists</title>
</head>
<body>

<h1>My Lists</h1>

<h2>Fruits</h2>
<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
    <li>Orange</li>
</ul>

<h2>Steps to Make Coffee</h2>
<ol>
    <li>Boil water</li>
    <li>Add coffee to a cup</li>
    <li>Pour hot water</li>
    <li>Add sugar or milk if desired</li>
    <li>Stir and enjoy</li>
</ol>

</body>
</html>
