<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Validation Page</title>
</head>

<body>

<h1>Input Validation Practice</h1>

<form>

<label for="username">Username:</label>
<input type="text"
       id="username"
       name="username"
       required
       minlength="4">

<br><br>

<button type="submit">Submit</button>

</form>

</body>
</html>
